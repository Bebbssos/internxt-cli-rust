name: Release

# Tag-triggered: push a `v*` tag to fan out into every distribution channel —
# GitHub release binaries (also what `ixr update` and cargo-binstall consume),
# a multi-arch Docker image, crates.io, and the AUR package. Asset naming
# below (`ixr-<rust-target-triple>.tar.gz`/`.zip`) is load-bearing: it must
# match `self_update::get_target()` (self_update_cmd.rs) and the
# `[package.metadata.binstall]` template in Cargo.toml.

on:
  push:
    tags:
      - "v*"

# Default GITHUB_TOKEN here is read-only; gh-release (create the release) and
# docker (push to GHCR) both need write access explicitly granted.
permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always
  ZIG_VERSION: 0.13.0

jobs:
  preflight:
    name: Preflight (test + publish dry-run)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --all-features
      # Catches manifest issues cargo publish would reject (e.g. an
      # unversioned git dependency) in ~1min, before the full build matrix
      # below spends ~20min finding out the same thing.
      - run: cargo publish -p internxt-cli --locked --dry-run

  build:
    name: build (${{ matrix.name }})
    needs: preflight
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Native glibc builds get the full feature set, including `fuse`
          # (needs libfuse headers at build time; not worth cross-compiling —
          # see Dockerfile's CLI_FEATURES comment).
          - name: x86_64-unknown-linux-gnu
            targets: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            apt: libfuse3-dev
            features: --all-features
          - name: aarch64-unknown-linux-gnu
            targets: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            apt: libfuse3-dev
            features: --all-features
          # 32-bit/legacy-ARM Linux: no GitHub-hosted native runner, so cross via
          # zig (same toolchain as the Dockerfile). No libfuse sysroot for these
          # targets, so `fuse` is dropped; everything else is pure Rust.
          - name: i686-unknown-linux-musl
            targets: i686-unknown-linux-musl
            os: ubuntu-latest
            cross: zig
            features: --no-default-features --features sso,webdav,webdav-tls,smb,nfs,sftp,dotenv,self-update,termimage
          - name: armv7-unknown-linux-musleabihf
            targets: armv7-unknown-linux-musleabihf
            os: ubuntu-latest
            cross: zig
            features: --no-default-features --features sso,webdav,webdav-tls,smb,nfs,sftp,dotenv,self-update,termimage
          - name: arm-unknown-linux-musleabihf
            targets: arm-unknown-linux-musleabihf
            os: ubuntu-latest
            cross: zig
            features: --no-default-features --features sso,webdav,webdav-tls,smb,nfs,sftp,dotenv,self-update,termimage
          # macOS: one arm64 runner builds *both* apple targets — Xcode's
          # clang cross-links x86_64 from an Apple Silicon host natively (no
          # separate toolchain needed), so this doesn't need its own
          # macos-13 (Intel) runner. GitHub's macOS runner pool is small and
          # shared account-wide, so halving the number of macOS jobs is the
          # main lever for shorter queue times, not build speed itself.
          # fuse dropped (macFUSE needs a kernel-ext install that doesn't
          # work unattended in CI); everything else native.
          - name: macos
            targets: aarch64-apple-darwin,x86_64-apple-darwin
            os: macos-latest
            features: --no-default-features --features sso,webdav,webdav-tls,smb,nfs,sftp,dotenv,self-update,termimage
          # Windows: `fuse` feature is inert here regardless (fuser is a
          # cfg(unix) dependency), left off explicitly for clarity. termimage
          # dropped too (Kitty/iTerm2 graphics protocols don't apply).
          - name: x86_64-pc-windows-msvc
            targets: x86_64-pc-windows-msvc
            os: windows-latest
            features: --no-default-features --features sso,webdav,webdav-tls,smb,nfs,sftp,dotenv,self-update
          # windows-11-arm: native hosted ARM64 runner (public preview) — no
          # cross-toolchain story for MSVC-ABI Windows (zig's cross linker
          # only reaches the musl targets above), so this needs a real
          # arm64 Windows host rather than cross-compiling from x86_64.
          - name: aarch64-pc-windows-msvc
            targets: aarch64-pc-windows-msvc
            os: windows-11-arm
            features: --no-default-features --features sso,webdav,webdav-tls,smb,nfs,sftp,dotenv,self-update
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.targets }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.name }}

      - name: Install libfuse (native linux only)
        if: matrix.apt
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.apt }}

      - name: Install zig + cargo-zigbuild (musl cross only)
        if: matrix.cross == 'zig'
        run: |
          set -eux
          curl -fsSL "https://ziglang.org/download/${ZIG_VERSION}/zig-linux-x86_64-${ZIG_VERSION}.tar.xz" -o /tmp/zig.tar.xz
          sudo mkdir -p /opt/zig
          sudo tar -xJf /tmp/zig.tar.xz -C /opt/zig --strip-components=1
          echo "/opt/zig" >> "$GITHUB_PATH"
          cargo install cargo-zigbuild --locked

      - name: Build (native)
        if: matrix.cross != 'zig'
        shell: bash
        run: |
          set -eux
          IFS=',' read -ra targets <<< "${{ matrix.targets }}"
          for t in "${targets[@]}"; do
            cargo build --release --locked -p internxt-cli --target "$t" ${{ matrix.features }}
          done

      - name: Build (zigbuild cross)
        if: matrix.cross == 'zig'
        # i686's blake3 AVX-512 cross-compile gap is worked around in the
        # internxt-core crate's Cargo.toml (forces the `pure` feature for
        # target_arch = "x86"), not here.
        run: cargo zigbuild --release --locked -p internxt-cli --target ${{ matrix.targets }} ${{ matrix.features }}

      - name: Package
        shell: bash
        run: |
          set -eux
          mkdir -p out
          IFS=',' read -ra targets <<< "${{ matrix.targets }}"
          for t in "${targets[@]}"; do
            rm -rf dist && mkdir -p dist
            if [[ "$t" == *windows* ]]; then
              cp "target/$t/release/ixr.exe" dist/ixr.exe
              (cd dist && 7z a "../out/ixr-$t.zip" ixr.exe)
              (cd out && sha256sum "ixr-$t.zip" > "ixr-$t.zip.sha256")
            else
              cp "target/$t/release/ixr" dist/ixr
              tar -C dist -czf "out/ixr-$t.tar.gz" ixr
              (cd out && shasum -a 256 "ixr-$t.tar.gz" > "ixr-$t.tar.gz.sha256")
            fi
          done

      - uses: actions/upload-artifact@v7
        with:
          name: ixr-${{ matrix.name }}
          path: out/*

  build-freebsd:
    name: build (x86_64-unknown-freebsd)
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # No usable cross-compile sysroot for FreeBSD (unlike the musl targets,
      # zig doesn't bundle one) — build natively inside a real FreeBSD guest
      # instead. vmactions boots the VM under QEMU and mounts this checkout
      # into it, so files written under the repo path here are visible back
      # on the ubuntu host once the step completes (no separate copy-back).
      - uses: vmactions/freebsd-vm@v1
        with:
          usesh: true
          prepare: |
            pkg install -y curl
            curl https://sh.rustup.rs -sSf | sh -s -- -y --profile minimal
          run: |
            . "$HOME/.cargo/env"
            cargo build --release --locked -p internxt-cli \
              --no-default-features --features sso,webdav,webdav-tls,smb,nfs,sftp,dotenv,self-update,termimage
            mkdir -p out
            cp target/release/ixr out/ixr

      - name: Package
        run: |
          set -eux
          tar -C out -czf "ixr-x86_64-unknown-freebsd.tar.gz" ixr
          shasum -a 256 "ixr-x86_64-unknown-freebsd.tar.gz" > "ixr-x86_64-unknown-freebsd.tar.gz.sha256"

      - uses: actions/upload-artifact@v7
        with:
          name: ixr-x86_64-unknown-freebsd
          path: ixr-x86_64-unknown-freebsd.tar.gz*

  gh-release:
    name: GitHub release
    needs: [build, build-freebsd]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          generate_release_notes: true
          # Tags with a `-` (e.g. v0.1.0-rc.1) are pre-releases: marked as
          # such on GitHub, and skipped by crates.io/AUR below — lets you
          # dry-run the whole binary/docker pipeline on a test tag without
          # touching those registries.
          prerelease: ${{ contains(github.ref_name, '-') }}

  docker:
    name: Docker image
    needs: gh-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - id: v
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # `latest` only follows stable tags — a pushed rc/test tag must not
      # clobber it.
      - id: tags
        run: |
          version="${{ steps.v.outputs.version }}"
          owner="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          image="ghcr.io/${owner}/ixr"
          tags="${image}:${version}"
          if [[ "$version" != *-* ]]; then
            tags="${tags}"$'\n'"${image}:latest"
          fi
          {
            echo "tags<<EOF"
            echo "$tags"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/386,linux/arm64,linux/arm/v7,linux/arm/v6
          build-args: VERSION=${{ steps.v.outputs.version }}
          tags: ${{ steps.tags.outputs.tags }}

  crates-io:
    name: Publish to crates.io
    needs: gh-release
    runs-on: ubuntu-latest
    # crates.io has no concept of "unlisted" pre-release cargo-side cleanup —
    # a test tag would leave a permanent published version. Only run for
    # stable tags (no `-`).
    if: ${{ !contains(github.ref_name, '-') }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      # internxt-core is published from its own repo (internxt-core-rust); this
      # only publishes the cli crate. Requires internxt-core already on
      # crates.io AND the dependency in Cargo.toml switched
      # from the git dep (used during the 0.x churn) to a crates.io version dep —
      # cargo refuses to publish a crate that has a git dependency.
      - run: cargo publish -p internxt-cli --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  aur:
    name: Publish AUR package
    needs: gh-release
    runs-on: ubuntu-latest
    # Same reasoning as crates-io: a test tag shouldn't push a real AUR update.
    if: ${{ !contains(github.ref_name, '-') }}
    steps:
      - uses: actions/checkout@v7
      - id: v
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Render PKGBUILD + .SRCINFO
        run: ./pkg/aur/render.sh "${{ steps.v.outputs.version }}"
      - uses: KSXGitHub/github-actions-deploy-aur@v4
        with:
          pkgname: ixr-bin
          pkgbuild: pkg/aur/PKGBUILD
          commit_username: ${{ github.actor }}
          commit_email: ${{ github.actor }}@users.noreply.github.com
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "ixr-bin ${{ steps.v.outputs.version }}"
